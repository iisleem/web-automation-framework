[pytest]
testpaths = tests
pythonpath = .
addopts =
    -ra
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir
markers =
    smoke: critical smoke tests for fast confidence
    regression: broader feature coverage
    e2e: end-to-end user journeys
    negative: negative validation scenarios
    reporting_demo: intentionally failing test used to demonstrate artifacts; skipped unless --run-reporting-demo is provided
    flaky: test can be retried with pytest-rerunfailures
    helpers: unit-style tests for reusable framework helpers
    examples: focused runnable usage recipes
log_cli = true
log_cli_level = INFO
